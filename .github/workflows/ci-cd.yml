name: CI/CD — CineStats

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-symfony:
    name: Tests PHPUnit (Symfony)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3

      - name: Install dependencies
        working-directory: symfony-api
        run: composer install --no-interaction --optimize-autoloader

      - name: Create DB
        working-directory: symfony-api
        run: php bin/console doctrine:schema:create --no-interaction
        env:
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"
          APP_ENV: test

      - name: Run PHPUnit
        working-directory: symfony-api
        run: php bin/phpunit

  test-express:
    name: Tests Jest (Express)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: stats-service/package-lock.json

      - name: Install dependencies
        working-directory: stats-service
        run: npm ci

      - name: Run Jest
        working-directory: stats-service
        run: npm test

  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: [test-symfony, test-express]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push symfony-api
        uses: docker/build-push-action@v5
        with:
          context: ./symfony-api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cinestats-symfony-api:latest

      - name: Build & push stats-service
        uses: docker/build-push-action@v5
        with:
          context: ./stats-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cinestats-stats-service:latest
